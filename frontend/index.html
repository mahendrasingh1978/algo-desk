    + '<div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">&#128161; Pro Tip</div>'
    + '<div style="font-size:12px;color:'+s.color+'">'+s.tip+'</div>'
    + '</div>';
}

function showHedge(w) {
  _activeHedge = w;
  var h = HEDGES[w];
  if (!h) return;

  // Update button styles
  [1,2,3,4].forEach(function(i) {
    var btn = document.getElementById('hbh-'+i);
    if (!btn) return;
    btn.style.background = i===w ? 'var(--green-bg)' : 'var(--bg3)';
    btn.style.borderColor = i===w ? 'var(--green)' : 'var(--border)';
    btn.style.color = i===w ? 'var(--green)' : 'var(--text2)';
  });

  var el = document.getElementById('hedge-detail');
  var atm = 24000;
  var gap = 50;

  var strikeDivs = h.strikes.map(function(offset) {
    var strike = atm + offset * gap;
    var isSell = h.sell.indexOf(offset) >= 0;
    var isBuy = h.buy.indexOf(offset) >= 0;
    var isAtm = offset === 0;
    var bg = isSell ? 'rgba(255,82,82,.15)' : isBuy ? 'rgba(0,230,118,.15)' : isAtm ? 'rgba(68,138,255,.1)' : 'var(--bg2)';
    var bc = isSell ? 'rgba(255,82,82,.4)' : isBuy ? 'rgba(0,230,118,.4)' : isAtm ? 'rgba(68,138,255,.3)' : 'var(--border)';
    var label = isSell ? 'SELL' : isBuy ? 'BUY' : '';
    var labelColor = isSell ? 'var(--red)' : isBuy ? 'var(--green)' : 'var(--text2)';
    return '<div style="min-width:50px;padding:6px 3px;text-align:center;border:1px solid '+bc+';background:'+bg+'">'
      + '<div style="font-size:10px;font-family:var(--mono);font-weight:600">'+(strike/1000).toFixed(1)+'K</div>'
      + '<div style="font-size:9px;color:'+labelColor+';font-weight:700;margin-top:2px">'+(label||'\u2014')+'</div>'
      + '</div>';
  }).join('');

  el.innerHTML = '<div style="font-size:13px;font-weight:600;margin-bottom:6px">'+h.label+'</div>'
    + '<p style="font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.6">'+h.desc+'</p>'
    + '<div style="display:flex;overflow-x:auto;gap:0;margin-bottom:12px;border-radius:var(--radius-sm);overflow:hidden">'+strikeDivs+'</div>'
    + '<div style="display:flex;gap:12px;margin-bottom:12px;font-size:11px;flex-wrap:wrap">'
    + '<span><span style="display:inline-block;width:10px;height:10px;background:rgba(255,82,82,.15);border:1px solid rgba(255,82,82,.4);border-radius:2px;margin-right:4px"></span>Sell (collect premium)</span>'
    + '<span><span style="display:inline-block;width:10px;height:10px;background:rgba(0,230,118,.15);border:1px solid rgba(0,230,118,.4);border-radius:2px;margin-right:4px"></span>Buy hedge (define risk)</span>'
    + '</div>'
    + '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;font-size:11px">'
    + '<div><div style="color:var(--text2);margin-bottom:2px">NET PREMIUM</div><div style="font-weight:600">'+h.premium+'</div></div>'
    + '<div><div style="color:var(--text2);margin-bottom:2px">MARGIN/LOT</div><div style="font-weight:600;color:var(--green)">'+h.margin+'</div></div>'
    + '<div><div style="color:var(--text2);margin-bottom:2px">MAX LOSS</div><div style="font-weight:600">'+h.maxloss+'</div></div>'
    + '<div><div style="color:var(--text2);margin-bottom:2px">BEST FOR</div><div style="font-weight:600;color:var(--amber)">'+h.best+'</div></div>'
    + '</div>';
}

function renderHelp() {
  var el = document.getElementById('pg-help');
  if (!el) return;
  if (_helpBuilt) return;
  _helpBuilt = true;
  el.innerHTML = buildHelpPage();
  setTimeout(initHelpInteractive, 50);
}

// Init help with default selections
function initHelpInteractive() {
  showStrat('S1');
  showHedge(2);
}


async function runCapitalCheck() {
  var el = document.getElementById('capital-check-result');
  if (!el) return;
  el.innerHTML = '<div style="display:flex;align-items:center;gap:8px;font-size:12px;padding:10px 0"><div class="spin"></div> Fetching funds &amp; calculating margins...</div>';

  var sym     = document.getElementById('af-sym').value;
  var lots    = parseInt(document.getElementById('af-lots').value) || 1;
  var lotSize = parseInt(document.getElementById('af-lotsize').value) || 0;
  var strats  = Array.from(selectedStrategies).join(',') || 'S1';

  try {
    var d = await api('GET',
      '/api/capital/check?symbol='+encodeURIComponent(sym)
      +'&lots='+lots+'&lot_size='+lotSize+'&strategies='+encodeURIComponent(strats));

    var canTrade = d.can_trade;
    var m = d.margin || {};
    var avail = d.available || 0;
    var isPaper = d.mode === 'paper';
    var borderColor = canTrade ? 'rgba(0,230,118,.3)' : isPaper ? 'rgba(255,171,64,.3)' : 'rgba(255,82,82,.3)';
    var headerColor = canTrade ? 'var(--green)' : isPaper ? 'var(--amber)' : 'var(--red)';

    var html = '<div style="border:1px solid '+borderColor+';border-radius:var(--radius-sm);overflow:hidden">';

    // Header bar
    html += '<div style="background:'+(canTrade?'var(--green-bg)':isPaper?'var(--amber-bg)':'var(--red-bg)')+';padding:10px 14px;display:flex;align-items:center;justify-content:space-between">'
      + '<div style="font-size:13px;font-weight:600;color:'+headerColor+'">'+(canTrade?'&#9989;':isPaper?'&#128203;':'&#10060;')+' '+esc(d.recommendation||'')+'</div>'
      + (isPaper ? '<span class="badge paper">Paper Mode</span>' : '')
      + '</div>';

    // Funds summary
    html += '<div style="padding:12px;display:grid;grid-template-columns:repeat(2,1fr);gap:8px;border-bottom:1px solid var(--border)">';
    html += '<div><div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">Available Balance</div>'
      + '<div style="font-size:16px;font-weight:700;color:var(--green)">₹'+Number(avail).toLocaleString('en-IN')+'</div></div>';
    html += '<div><div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">Margin Required (1 lot)</div>'
      + '<div style="font-size:16px;font-weight:700">₹'+Number(m.per_lot||0).toLocaleString('en-IN')+'</div></div>';
    html += '<div><div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">Qty ('+lots+' lot'+(lots>1?'s':'')+')</div>'
      + '<div style="font-size:13px;font-weight:600">'+(d.qty||0)+' units</div></div>';
    html += '<div><div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">Max Lots Possible</div>'
      + '<div style="font-size:13px;font-weight:600;color:'+(canTrade?'var(--green)':'var(--red)')+'">'+( d.buffer_lots!=null?(d.buffer_lots+1):0)+'</div></div>';
    html += '</div>';

    // Per-strategy table
    if (d.strat_breakdown && d.strat_breakdown.length > 0) {
      html += '<div style="padding:12px;border-bottom:1px solid var(--border)">';
      html += '<div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">Strategy Comparison</div>';
      html += '<div style="overflow-x:auto"><table class="tbl"><thead><tr>'
        + '<th>Strategy</th><th>Structure</th><th>Hedge</th>'
        + '<th>Margin/lot</th><th>Net Premium</th>'
        + '<th>Max Profit</th><th>Max Loss</th>'
        + '<th>Status</th>'
        + '</tr></thead><tbody>';
      d.strat_breakdown.forEach(function(sb) {
        var ok = sb.can_trade;
        html += '<tr>'
          + '<td><span class="badge strategy">'+sb.strategy+'</span> <span style="font-size:11px">'+esc(sb.label||'')+'</span></td>'
          + '<td style="font-size:11px">'+esc(sb.structure||'')+'</td>'
          + '<td style="font-family:var(--mono);font-size:11px">±'+sb.hedge_width+'</td>'
          + '<td style="font-family:var(--mono);font-size:11px">₹'+Number(sb.per_lot||0).toLocaleString('en-IN')+'</td>'
          + '<td style="font-family:var(--mono);font-size:11px;color:var(--green)">₹'+Number(sb.net_premium||0).toLocaleString('en-IN')+'</td>'
          + '<td style="font-family:var(--mono);font-size:11px;color:var(--green)">₹'+Number(sb.max_profit||0).toLocaleString('en-IN')+'</td>'
          + '<td style="font-family:var(--mono);font-size:11px;color:var(--red)">₹'+Number(sb.max_loss||0).toLocaleString('en-IN')+'</td>'
          + '<td><span class="badge '+(ok?'running':'idle')+'">'+(ok?'&#9989; OK':'&#10060; Low funds')+'</span></td>'
          + '</tr>';
      });
      html += '</tbody></table></div>';

      // Break-even for first strategy
      var first = d.strat_breakdown[0];
      if (first && first.be_upper) {
        html += '<div style="margin-top:8px;font-size:11px;color:var(--text2)">'
          + 'Break-even range: '
          + '<strong style="color:var(--text)">₹'+Number(first.be_lower).toLocaleString('en-IN')+'</strong>'
          + ' — '
          + '<strong style="color:var(--text)">₹'+Number(first.be_upper).toLocaleString('en-IN')+'</strong>'
          + ' &nbsp;·&nbsp; 50% profit target: '
          + '<strong style="color:var(--green)">₹'+Number(first.profit_at_50||0).toLocaleString('en-IN')+'</strong>'
          + '</div>';
      }
      html += '</div>';

      // Leg-by-leg breakdown for first strategy
      var firstLegs = first && first.legs;
      if (firstLegs && firstLegs.length) {
        html += '<div style="padding:12px">';
        html += '<div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">Order Legs — '+esc(first.strategy||'')+'</div>';
        firstLegs.forEach(function(leg) {
          var isCredit = leg.type === 'credit';
          html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)">'
            + '<div style="display:flex;align-items:center;gap:8px">'
            + '<span style="width:40px;font-size:10px;font-weight:700;text-align:center;padding:2px 4px;border-radius:4px;background:'+(isCredit?'var(--green-bg)':'var(--red-bg)')+';color:'+(isCredit?'var(--green)':'var(--red)')+'">'+esc(leg.action)+'</span>'
            + '<div><div style="font-size:12px;font-weight:500">'+esc(leg.leg)+'</div>'
            + '<div style="font-size:10px;color:var(--text2)">'+esc(leg.note||'')+'</div></div>'
            + '</div>'
            + '<div style="text-align:right">'
            + '<div style="font-size:12px;font-weight:600;font-family:var(--mono);color:'+(isCredit?'var(--green)':'var(--red)')+'">'+( isCredit?'+':'-')+'₹'+Number(leg.value||0).toLocaleString('en-IN')+'</div>'
            + '<div style="font-size:10px;color:var(--text2)">₹'+leg.est_premium+' × '+leg.qty+' units</div>'
            + '</div></div>';
        });
        // Net premium row
        html += '<div style="display:flex;justify-content:space-between;padding:8px 0;font-weight:600">'
          + '<span style="font-size:12px">Net Premium Collected</span>'
          + '<span style="font-size:13px;color:var(--green);font-family:var(--mono)">₹'+Number(m.net_premium||0).toLocaleString('en-IN')+'</span>'
          + '</div>';
        html += '<div style="font-size:10px;color:var(--text2);margin-top:4px">'+esc(m.note||'')+'</div>';
        html += '</div>';
      }
    }

    html += '</div>';
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<div class="alert alert-error">'+esc(e.message)+'</div>';
  }
}

async function runReconcile() {
  var btn = document.getElementById('recon-btn');
  var panel = document.getElementById('recon-panel');
  if (!btn || !panel) return;
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>';
  panel.innerHTML = '<div class="card-body"><div style="display:flex;align-items:center;gap:8px;font-size:12px"><div class="spin"></div> Fetching orderbook and positions from Fyers...</div></div>';
  try {
    var d = await api('GET', '/api/engine/reconcile');
    if (!d.ok) {
      panel.innerHTML = '<div class="card-body"><div class="alert alert-error">'+esc(d.message||'Failed')+'</div></div>';
      return;
    }
    if (d.mode === 'paper') {
      panel.innerHTML = '<div class="card-body"><div class="alert alert-info">Paper mode — no real orders to reconcile.</div></div>';
      return;
    }
    var s = d.summary||{};
    var reconOk = d.reconciled;
    var statusColor = reconOk ? 'var(--green)' : 'var(--amber)';
    var html = '<div class="card-body">'
      + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">'
      + '<div class="dot" style="background:'+statusColor+'"></div>'
      + '<span style="font-size:13px;font-weight:600;color:'+statusColor+'">'+(reconOk?'All positions reconciled':'Check required')+'</span>'
      + '<span style="font-size:11px;color:var(--text2)">'+esc(d.timestamp||'')+'</span>'
      + '</div>'
      + '<div class="kpi-grid" style="margin-bottom:12px">'
      + '<div class="kpi '+(s.filled===s.total_orders&&s.total_orders>0?'green':'')+'"><div class="kpi-label">Orders Filled</div><div class="kpi-value neutral">'+s.filled+' / '+s.total_orders+'</div></div>'
      + '<div class="kpi '+(s.rejected>0?'red':'')+'"><div class="kpi-label">Rejected</div><div class="kpi-value '+(s.rejected>0?'neg':'neutral')+'">'+s.rejected+'</div></div>'
      + '<div class="kpi '+(s.pending>0?'amber':'')+'"><div class="kpi-label">Pending</div><div class="kpi-value neutral">'+s.pending+'</div></div>'
      + '<div class="kpi"><div class="kpi-label">Open Positions</div><div class="kpi-value neutral">'+s.open_positions+'</div></div>'
      + '</div>';

    // Mismatches
    if (d.mismatches && d.mismatches.length > 0) {
      html += '<div class="alert alert-error" style="margin-bottom:10px">'
        + '<strong>Mismatches detected:</strong><br>'
        + d.mismatches.map(function(m){ return esc(m.strategy)+': '+esc(m.issue); }).join('<br>')
        + '</div>';
    }

    // Positions table
    if (d.positions && d.positions.length > 0) {
      html += '<div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Open Positions in Fyers</div>'
        + '<div class="tbl-wrap"><table class="tbl">'
        + '<thead><tr><th>Symbol</th><th>Side</th><th>Qty</th><th>Avg Price</th><th>LTP</th><th>P&L</th></tr></thead><tbody>'
        + d.positions.map(function(p){
            return '<tr>'
              +'<td style="font-size:11px;font-family:var(--mono)">'+esc(p.symbol.split(':')[1]||p.symbol)+'</td>'
              +'<td><span class="badge '+(p.side==="LONG"?"running":"idle")+'">'+p.side+'</span></td>'
              +'<td class="mono">'+p.net_qty+'</td>'
              +'<td class="mono">'+p.avg_price.toFixed(1)+'</td>'
              +'<td class="mono">'+p.ltp.toFixed(1)+'</td>'
              +'<td class="mono '+( p.pnl>=0?'pos':'neg')+'">'+pnlFmt(p.pnl)+'</td>'
              +'</tr>';
          }).join('')
        + '</tbody></table></div>';
    } else {
      html += '<div style="font-size:12px;color:var(--text2);margin-bottom:8px">No open positions in Fyers account</div>';
    }

    // Recent orders
    var recentOrders = (d.orders||[]).slice(0,8);
    if (recentOrders.length > 0) {
      html += '<div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin:10px 0 6px">Recent Orders</div>'
        + '<div class="tbl-wrap"><table class="tbl">'
        + '<thead><tr><th>Symbol</th><th>Side</th><th>Qty</th><th>Status</th><th>Fill Price</th></tr></thead><tbody>'
        + recentOrders.map(function(o){
            var statusColor = o.status_code===2?'var(--green)':o.status_code===5?'var(--red)':o.status_code===6?'var(--amber)':'var(--text2)';
            return '<tr>'
              +'<td style="font-size:11px;font-family:var(--mono)">'+esc((o.symbol||'').split(':')[1]||o.symbol||'')+'</td>'
              +'<td><span class="badge '+(o.side==="BUY"?"running":"idle")+'">'+esc(o.side)+'</span></td>'
              +'<td class="mono">'+o.filled_qty+'/'+o.qty+'</td>'
              +'<td style="color:'+statusColor+';font-size:11px;font-weight:600">'+esc(o.status)+'</td>'
              +'<td class="mono">'+(o.avg_price>0?o.avg_price.toFixed(1):'—')+'</td>'
              +'</tr>';
          }).join('')
        + '</tbody></table></div>';
    }

    html += '</div>';
    panel.innerHTML = html;
  } catch(e) {
    if (panel) panel.innerHTML = '<div class="card-body"><div class="alert alert-error">'+esc(e.message)+'</div></div>';
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = 'Check Now'; }
  }
}

document.addEventListener('DOMContentLoaded', async function() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth').style.display = 'flex';

  var saved = localStorage.getItem('algodesk');
  if (saved) {
    try {
      var s = JSON.parse(saved);
      if (s && s.token) {
        var r = await fetch('/api/me', {headers:{'Authorization':'Bearer '+s.token}});
        if (r.ok) {
          var me = await r.json();
          session.token = s.token;
          session.user = {email:me.email, name:me.name, role:me.role, plan:me.plan};
          showApp();
          return;
        }
      }
    } catch(e) {}
    localStorage.removeItem('algodesk');
  }
  switchAuthTab('login');
});
