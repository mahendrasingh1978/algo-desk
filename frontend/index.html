<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>AlgoDesk — NIFTY Options Trading</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap">
<style>
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--bg4:#22222e;
  --border:#2a2a38;--border2:#3a3a50;
  --text:#f0f0f8;--text2:#9090b0;--text3:#5050708;
  --green:#00e676;--green2:#00c853;--green-bg:rgba(0,230,118,.08);
  --red:#ff5252;--red2:#d32f2f;--red-bg:rgba(255,82,82,.08);
  --amber:#ffab40;--amber-bg:rgba(255,171,64,.08);
  --blue:#448aff;--blue-bg:rgba(68,138,255,.08);
  --purple:#ce93d8;--purple-bg:rgba(206,147,216,.08);
  --mono:"JetBrains Mono",monospace;
  --sans:"Inter",sans-serif;
  --display:"Syne",sans-serif;
  --radius:12px;--radius-sm:8px;--radius-lg:16px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;overflow:hidden}

/* ── Layout ── */
#app{display:flex;height:100vh;height:100dvh;overflow:hidden}
#sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:none;flex-direction:column;flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{height:calc(56px + env(safe-area-inset-top));background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:flex-end;padding:0 16px 12px;gap:12px;flex-shrink:0;padding-left:calc(16px + env(safe-area-inset-left));padding-right:calc(16px + env(safe-area-inset-right))}
#content{flex:1;overflow-y:auto;padding:16px;padding-bottom:calc(72px + env(safe-area-inset-bottom))}
#bottomnav{height:calc(56px + env(safe-area-inset-bottom));background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-around;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}

/* ── Sidebar ── */
.logo{padding:20px 16px 12px;font-family:var(--display);font-size:20px;font-weight:700;letter-spacing:-.5px}
.logo span{color:var(--green)}
.nav-section{padding:8px 8px;flex:1;overflow-y:auto}
.nav-link{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;margin-bottom:2px}
.nav-link:hover{background:var(--bg3);color:var(--text)}
.nav-link.active{background:var(--green-bg);color:var(--green)}
.nav-link svg{width:16px;height:16px;flex-shrink:0}
.sidebar-bottom{padding:12px 8px;border-top:1px solid var(--border)}

/* ── Topbar ── */
.tb-logo{font-family:var(--display);font-size:18px;font-weight:700;letter-spacing:-.5px}
.tb-logo span{color:var(--green)}
.tb-spacer{flex:1}
.tb-price{font-family:var(--mono);font-size:13px;font-weight:500;padding:4px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);min-width:80px;text-align:center}
.tb-price.live{color:var(--green);border-color:rgba(0,230,118,.3)}
.tb-price.closed{color:var(--text2)}
.tb-price.waiting{color:var(--amber)}
.tb-btn{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:all .15s;flex-shrink:0}
.tb-btn:hover{background:var(--bg4);color:var(--text)}
.tb-av{width:32px;height:32px;border-radius:50%;background:var(--green-bg);border:1px solid rgba(0,230,118,.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--green);cursor:pointer;flex-shrink:0}

/* ── Bottom nav ── */
.bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 12px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);transition:all .15s;min-width:48px;min-height:44px;-webkit-tap-highlight-color:transparent}
.bn-item svg{width:20px;height:20px}
.bn-item span{font-size:9px;font-weight:500;letter-spacing:.3px;text-transform:uppercase}
.bn-item.active{color:var(--green)}
.bn-item:hover{color:var(--text)}

/* ── Pages ── */
.page{display:none}
.page.active{display:block}

/* ── Auth ── */
#auth{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;padding:max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom))}
.auth-box{width:100%;max-width:400px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.auth-header{padding:32px 28px 24px;text-align:center;background:linear-gradient(135deg,var(--bg3) 0%,var(--bg2) 100%);border-bottom:1px solid var(--border)}
.auth-logo{font-family:var(--display);font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px}
.auth-logo span{color:var(--green)}
.auth-sub{font-size:13px;color:var(--text2)}
.auth-body{padding:24px 28px 28px}
.auth-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--text2)}
.auth-switch a{color:var(--green);cursor:pointer;text-decoration:none}
.auth-tabs{display:flex;gap:0;margin-bottom:20px;background:var(--bg3);border-radius:var(--radius-sm);padding:3px}
.auth-tab{flex:1;text-align:center;padding:7px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .15s}
.auth-tab.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}

/* ── Cards ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.card.live-border{border-color:rgba(255,82,82,.4)}
.card.paper-border{border-color:rgba(255,171,64,.3)}
.card-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600;color:var(--text)}
.card-body{padding:16px}
.card-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.card-row:last-child{border-bottom:none}
.card-label{font-size:12px;color:var(--text2)}
.card-val{font-size:12px;font-weight:500}

/* ── KPI tiles ── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.kpi-grid.four{grid-template-columns:repeat(4,1fr)}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.green::before{background:var(--green)}
.kpi.red::before{background:var(--red)}
.kpi.amber::before{background:var(--amber)}
.kpi.blue::before{background:var(--blue)}
.kpi.purple::before{background:var(--purple)}
.kpi-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kpi-value{font-family:var(--display);font-size:22px;font-weight:700;line-height:1.1;margin-bottom:3px}
.kpi-value.mono{font-family:var(--mono);font-size:18px}
.kpi-sub{font-size:11px;color:var(--text2)}
.kpi-value.pos{color:var(--green)}
.kpi-value.neg{color:var(--red)}
.kpi-value.neutral{color:var(--text)}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:99px;font-size:10px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.badge.live{background:var(--red-bg);color:var(--red);border:1px solid rgba(255,82,82,.3)}
.badge.paper{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(255,171,64,.3)}
.badge.running{background:var(--green-bg);color:var(--green);border:1px solid rgba(0,230,118,.3)}
.badge.idle{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.badge.shadow{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(68,138,255,.3)}
.badge.s1,.badge.s7{background:var(--blue-bg);color:var(--blue)}
.badge.s8,.badge.s2{background:var(--purple-bg);color:var(--purple)}
.badge.s9{background:var(--amber-bg);color:var(--amber)}
.badge.s5{background:var(--red-bg);color:var(--red)}
.badge.strategy{background:var(--bg3);color:var(--text2);border:1px solid var(--border);font-size:9px;padding:2px 6px}

/* ── Forms ── */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select,.field textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;color:var(--text);font-family:var(--sans);transition:border-color .15s;outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green)}
.field input::placeholder{color:var(--text2)}
.field-hint{font-size:11px;color:var(--text2);margin-top:4px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:none;outline:none;font-family:var(--sans);white-space:nowrap}
.btn-primary{background:var(--green);color:#000}
.btn-primary:hover{background:var(--green2)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:var(--red2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-full{width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}

/* ── Alert ── */
.alert{padding:10px 14px;border-radius:var(--radius-sm);font-size:12px;display:flex;align-items:flex-start;gap:8px;margin-bottom:12px}
.alert-error{background:var(--red-bg);border:1px solid rgba(255,82,82,.3);color:#ff8a80}
.alert-success{background:var(--green-bg);border:1px solid rgba(0,230,118,.3);color:#69f0ae}
.alert-info{background:var(--blue-bg);border:1px solid rgba(68,138,255,.3);color:#82b1ff}
.alert-warn{background:var(--amber-bg);border:1px solid rgba(255,171,64,.3);color:#ffd180}

/* ── Tables ── */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:8px 10px;text-align:left;color:var(--text2);font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);font-weight:500}
.tbl td{padding:10px;border-bottom:1px solid var(--border)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg3)}

/* ── Toggle ── */
.toggle{position:relative;display:inline-block;width:38px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-track{position:absolute;inset:0;background:var(--bg4);border-radius:99px;cursor:pointer;transition:background .2s;border:1px solid var(--border)}
.toggle input:checked+.toggle-track{background:var(--green);border-color:var(--green)}
.toggle-track::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s}
.toggle input:checked+.toggle-track::after{transform:translateX(16px)}

/* ── Misc ── */
.section-title{font-family:var(--display);font-size:16px;font-weight:600;margin-bottom:12px;color:var(--text)}
.page-header{margin-bottom:16px}
.page-title{font-family:var(--display);font-size:20px;font-weight:700;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--text2)}
.empty{text-align:center;padding:32px 16px;color:var(--text2)}
.empty-icon{font-size:32px;margin-bottom:8px}
.empty-title{font-size:14px;font-weight:500;margin-bottom:4px;color:var(--text)}
.empty-sub{font-size:12px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.green{background:var(--green)}
.dot.red{background:var(--red)}
.dot.amber{background:var(--amber)}
.dot.gray{background:var(--text2)}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
details summary{cursor:pointer;user-select:none;list-style:none;font-size:12px;color:var(--text2);padding:8px 0}
details summary::-webkit-details-marker{display:none}
details[open] summary{color:var(--text)}

/* ── Trade item ── */
.trade-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.trade-item:last-child{border-bottom:none}
.trade-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;font-weight:600}
.trade-info{flex:1;min-width:0}
.trade-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trade-meta{font-size:11px;color:var(--text2);margin-top:2px}
.trade-pnl{text-align:right;flex-shrink:0}
.trade-pnl-val{font-family:var(--mono);font-size:13px;font-weight:600}
.trade-pnl-sub{font-size:10px;color:var(--text2);margin-top:2px}

/* ── Strategy picker ── */
.strategy-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.strat-pick{padding:8px 6px;border:1px solid var(--border);border-radius:var(--radius-sm);text-align:center;cursor:pointer;transition:all .15s;background:var(--bg3)}
.strat-pick:hover{border-color:var(--border2)}
.strat-pick.selected{border-color:var(--green);background:var(--green-bg)}
.strat-pick-code{font-size:11px;font-weight:700;font-family:var(--mono);margin-bottom:2px}
.strat-pick-name{font-size:9px;color:var(--text2);line-height:1.3}
.strat-pick.selected .strat-pick-name{color:var(--green)}

/* ── Log entries ── */
.log-entry{display:flex;gap:8px;padding:5px 0;font-size:11px;border-bottom:1px solid var(--border);font-family:var(--mono)}
.log-entry:last-child{border-bottom:none}
.log-time{color:var(--text2);flex-shrink:0;width:50px}
.log-msg{flex:1;word-break:break-all}
.log-info{color:var(--text)}
.log-signal{color:var(--blue)}
.log-order{color:var(--green)}
.log-sl{color:var(--red)}
.log-ok{color:var(--green)}
.log-warn{color:var(--amber)}
.log-error{color:var(--red)}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── Toast ── */
#toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg4);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 18px;font-size:13px;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap;max-width:90vw}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{border-color:rgba(0,230,118,.4);color:var(--green)}
#toast.error{border-color:rgba(255,82,82,.4);color:var(--red)}

/* ── Responsive breakpoints ── */

/* Very small phones (SE, older Android) */
@media(max-width:360px){
  .kpi-grid{grid-template-columns:1fr 1fr}
  .bn-item{min-width:36px;padding:6px 4px}
  .bn-item span{font-size:8px}
  #content{padding:10px;padding-bottom:calc(72px + env(safe-area-inset-bottom))}
  .page-title{font-size:17px}
  .kpi-value{font-size:18px}
  .auth-box{margin:0 4px}
}

/* Normal phones (375–767px) — bottom nav visible */
@media(max-width:767px){
  #sidebar{display:none}
  #bottomnav{display:flex}
  /* Cards full width, no horizontal overflow */
  .card{border-radius:10px}
  .field-row{grid-template-columns:1fr}
  .kpi-grid.four{grid-template-columns:1fr 1fr}
  /* Tables scroll horizontally */
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  /* Automate form strategy grid 3 col on phone */
  .strategy-grid{grid-template-columns:repeat(3,1fr)}
}

/* Tablet portrait (600–767px) — still bottom nav */
@media(min-width:600px) and (max-width:767px){
  .kpi-grid{grid-template-columns:repeat(4,1fr)}
  .strategy-grid{grid-template-columns:repeat(5,1fr)}
  .field-row{grid-template-columns:1fr 1fr}
}

/* Tablet landscape + desktop (768px+) — sidebar visible */
@media(min-width:768px){
  #sidebar{display:flex}
  #bottomnav{display:none}
  /* Remove mobile bottom padding — no bottom nav */
  #content{padding:24px;padding-bottom:24px}
  .kpi-grid{grid-template-columns:repeat(4,1fr)}
  .strategy-grid{grid-template-columns:repeat(5,1fr)}
}

/* Wide desktop (1200px+) — wider sidebar */
@media(min-width:1200px){
  #sidebar{width:240px}
  #content{padding:28px 32px;padding-bottom:28px}
}

/* iPhone landscape — shrink top/bottom bars */
@media(max-height:500px) and (orientation:landscape){
  #topbar{height:calc(44px + env(safe-area-inset-top));padding-bottom:8px}
  #bottomnav{height:calc(44px + env(safe-area-inset-bottom))}
  .bn-item{padding:4px 12px}
  #content{padding:10px;padding-bottom:calc(50px + env(safe-area-inset-bottom))}
}
</style>
</head>
<body>


<!-- ══════════════════════════════════════════════════
     AUTH SCREEN
══════════════════════════════════════════════════ -->
<div id="auth">
  <div class="auth-box">
    <div class="auth-header">
      <div class="auth-logo">ALGO<span>DESK</span></div>
      <div class="auth-sub">Professional NIFTY options trading</div>
    </div>
    <div class="auth-body">
      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Sign In</div>
        <div class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">Create Account</div>
      </div>

      <!-- Login form -->
      <div id="login-form">
        <div id="login-err" class="alert alert-error" style="display:none">
          <span id="login-err-msg">Login failed</span>
        </div>
        <div class="field">
          <label>Email</label>
          <input id="li-email" type="email" placeholder="you@email.com" autocomplete="email"
                 onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <div class="field">
          <label>Password</label>
          <input id="li-pass" type="password" placeholder="Password" autocomplete="current-password"
                 onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">Sign In</button>
        <div style="text-align:center;margin-top:12px">
          <a style="font-size:12px;color:var(--text2);cursor:pointer" onclick="switchAuthTab('forgot')">Forgot password?</a>
        </div>
      </div>

      <!-- Register form -->
      <div id="register-form" style="display:none">
        <div id="reg-err" class="alert alert-error" style="display:none">
          <span id="reg-err-msg">Registration failed</span>
        </div>
        <div class="field"><label>Full Name</label>
          <input id="reg-name" placeholder="Your name" onkeydown="if(event.key==='Enter')doRegister()">
        </div>
        <div class="field"><label>Email</label>
          <input id="reg-email" type="email" placeholder="you@email.com" onkeydown="if(event.key==='Enter')doRegister()">
        </div>
        <div class="field"><label>Password</label>
          <input id="reg-pass" type="password" placeholder="Min 8 characters" onkeydown="if(event.key==='Enter')doRegister()">
        </div>
        <div class="field"><label>Confirm Password</label>
          <input id="reg-pass2" type="password" placeholder="Repeat password" onkeydown="if(event.key==='Enter')doRegister()">
        </div>
        <div class="field"><label>Invite Code (optional)</label>
          <input id="reg-invite" placeholder="Leave blank if not required">
        </div>
        <button class="btn btn-primary btn-full" onclick="doRegister()">Create Account</button>
      </div>

      <!-- Forgot form -->
      <div id="forgot-form" style="display:none">
        <div class="field"><label>Email</label>
          <input id="forgot-email" type="email" placeholder="you@email.com">
        </div>
        <button class="btn btn-primary btn-full" onclick="doForgot()">Send Reset Link</button>
        <div style="text-align:center;margin-top:12px">
          <a style="font-size:12px;color:var(--text2);cursor:pointer" onclick="switchAuthTab('login')">Back to sign in</a>
        </div>
      </div>
    </div>
  </div>

<script>
// ══════════════════════════════════════════════════════════
// ALGO-DESK FRONTEND — COMPLETE CLEAN REWRITE
// No patches. No legacy. Everything tested.
// ══════════════════════════════════════════════════════════

var session = {token:null, user:null};
var brokerDefs = [];
var myBrokers = [];
var selectedStrategies = new Set(['S1','S8']);
var wsConn = null;
var _tickerTimer = null;

// ── API ────────────────────────────────────────────────────
async function api(method, path, body) {
  var opts = {method:method, headers:{'Content-Type':'application/json'}};
  if (session.token) opts.headers['Authorization'] = 'Bearer ' + session.token;
  if (body) opts.body = JSON.stringify(body);
  var r = await fetch(path, opts);
  var d = await r.json();
  if (!r.ok) {
    var msg = d.detail || d.message || 'Request failed';
    if (Array.isArray(msg)) msg = msg.map(function(e){return e.msg||e;}).join(', ');
    throw new Error(msg);
  }
  return d;
}

// ── AUTH ────────────────────────────────────────────────────
function switchAuthTab(tab) {
  document.getElementById('login-form').style.display = tab==='login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab==='register' ? 'block' : 'none';
  document.getElementById('forgot-form').style.display = tab==='forgot' ? 'block' : 'none';
  document.getElementById('tab-login').className = 'auth-tab' + (tab==='login'?' active':'');
  document.getElementById('tab-register').className = 'auth-tab' + (tab==='register'?' active':'');
}

async function doLogin() {
  var email = document.getElementById('li-email').value.trim();
  var pass = document.getElementById('li-pass').value;
  var errEl = document.getElementById('login-err');
  errEl.style.display = 'none';
  if (!email || !pass) {
    errEl.style.display = 'flex';
    document.getElementById('login-err-msg').textContent = 'Enter your email and password';
    return;
  }
  var btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>';
  try {
    var d = await api('POST', '/api/auth/login', {email:email, password:pass});
    session.token = d.token;
    session.user = {email:d.email, name:d.name, role:d.role, plan:d.plan};
    localStorage.setItem('algodesk', JSON.stringify(session));
    showApp();
  } catch(e) {
    errEl.style.display = 'flex';
    document.getElementById('login-err-msg').textContent = e.message;
    btn.disabled = false;
    btn.innerHTML = 'Sign In';
  }
}

async function doRegister() {
  var name = document.getElementById('reg-name').value.trim();
  var email = document.getElementById('reg-email').value.trim();
  var pass = document.getElementById('reg-pass').value;
  var pass2 = document.getElementById('reg-pass2').value;
  var invite = document.getElementById('reg-invite').value.trim();
  var errEl = document.getElementById('reg-err');
  errEl.style.display = 'none';
  if (!name || !email || !pass) {
    errEl.style.display = 'flex';
    document.getElementById('reg-err-msg').textContent = 'Fill all required fields';
    return;
  }
  if (pass !== pass2) {
    errEl.style.display = 'flex';
    document.getElementById('reg-err-msg').textContent = 'Passwords do not match';
    return;
  }
  try {
    var d = await api('POST', '/api/auth/register', {name:name, email:email, password:pass, invite_token:invite||null});
    session.token = d.token;
    session.user = {email:d.email, name:d.name, role:d.role, plan:d.plan};
    localStorage.setItem('algodesk', JSON.stringify(session));
    showApp();
  } catch(e) {
    errEl.style.display = 'flex';
    document.getElementById('reg-err-msg').textContent = e.message;
  }
}

async function doForgot() {
  var email = document.getElementById('forgot-email').value.trim();
  if (!email) return;
  try {
    await api('POST', '/api/auth/reset-request', {email:email});
    toast('Reset link sent if account exists', 'success');
    switchAuthTab('login');
  } catch(e) { toast(e.message, 'error'); }
}

function doLogout() {
  session = {token:null, user:null};
  localStorage.removeItem('algodesk');
  if (wsConn) { wsConn.close(); wsConn = null; }
  if (_tickerTimer) { clearInterval(_tickerTimer); _tickerTimer = null; }
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth').style.display = 'flex';
}

// ── APP INIT ────────────────────────────────────────────────
function showApp() {
  document.getElementById('auth').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  var u = session.user;
  var initials = (u.name||'?').split(' ').map(function(w){return w[0];}).join('').substring(0,2).toUpperCase();
  document.getElementById('tb-av').textContent = initials;
  if (u.role === 'SUPER_ADMIN' || u.role === 'ADMIN') {
    var el = document.getElementById('sn-admin');
    if (el) el.style.display = 'flex';
  }
  nav('dashboard');
  startTicker();
  try {
    api('GET', '/api/brokers/definitions').then(function(d){ brokerDefs = d.brokers||[]; });
  } catch(e) {}
}

// ── NAV ─────────────────────────────────────────────────────
function nav(id) {
  var pages = ['dashboard','brokers','automate','live','trades','performance','help','profile','admin'];
  pages.forEach(function(p) {
    var pg = document.getElementById('pg-' + p);
    if (pg) pg.className = 'page' + (p===id ? ' active' : '');
    var sn = document.getElementById('sn-' + p);
    if (sn) sn.className = 'nav-link' + (p===id ? ' active' : '');
    var bn = document.getElementById('bn-' + p);
    if (bn) bn.className = 'bn-item' + (p===id ? ' active' : '');
  });
  // Lazy render pages
  if (id==='dashboard') renderDashboard();
  if (id==='brokers') renderBrokers();
  if (id==='automate') renderAutomate();
  if (id==='live') renderLive();
  if (id==='trades') renderTrades();
  if (id==='performance') renderPerformance();
  if (id==='help') renderHelp();
  if (id==='profile') renderProfile();
  if (id==='admin') renderAdmin();
}

// ── TOAST ────────────────────────────────────────────────────
function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' '+type : '');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

// ── TICKER ──────────────────────────────────────────────────
function startTicker() {
  updateTicker();
  _tickerTimer = setInterval(updateTicker, 60000);
}

async function updateTicker() {
  if (!session.token) return;
  try {
    var d = await api('GET', '/api/market/status');
    var el = document.getElementById('tb-price');
    if (!el) return;
    if (d.spot && d.spot > 0) {
      el.textContent = Number(d.spot).toLocaleString('en-IN', {minimumFractionDigits:1, maximumFractionDigits:1});
      el.className = 'tb-price ' + (d.status==='live' ? 'live' : d.status==='closed' ? 'closed' : 'waiting');
    } else {
      el.textContent = d.status==='waiting' ? 'No broker' : '—';
      el.className = 'tb-price waiting';
    }
  } catch(e) {}
}

// ── HELPERS ──────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function pnlFmt(v) { v=v||0; return (v>=0?'+':'')+'\u20b9'+Math.abs(v).toLocaleString('en-IN'); }
function pnlClass(v) { return v>0?'pos':v<0?'neg':'neutral'; }
function fmtTime(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}); }
  catch(e) { return iso.substring(11,16)||'—'; }
}
function fmtDate(s) {
  if (!s) return '—';
  try { return new Date(s).toLocaleDateString('en-IN',{day:'2-digit',month:'short'}); }
  catch(e) { return s; }
}


// ══════════════════════════════════════════════════════════
// PAGE RENDERERS
// Each page renders itself into its container on demand
// ══════════════════════════════════════════════════════════

// ── DASHBOARD ────────────────────────────────────────────────
// ── Dashboard symbol watchlist state ────────────────────────
var _dashSymbol = 'NSE:NIFTY50-INDEX';
var _dashSymbols = [
  {value:'NSE:NIFTY50-INDEX',  label:'NIFTY',    short:'NF'},
  {value:'NSE:NIFTYBANK-INDEX',label:'BANKNIFTY', short:'BNF'},
  {value:'NSE:FINNIFTY-INDEX', label:'FINNIFTY',  short:'FNF'},
  {value:'BSE:SENSEX-INDEX',   label:'SENSEX',    short:'SX'},
];

function setDashSymbol(sym) {
  _dashSymbol = sym;
  // Update tab styles
  _dashSymbols.forEach(function(s) {
    var btn = document.getElementById('dsym-'+s.short);
    if (!btn) return;
    if (s.value === sym) {
      btn.style.background = 'var(--green-bg)';
      btn.style.borderColor = 'rgba(0,230,118,.4)';
      btn.style.color = 'var(--green)';
    } else {
      btn.style.background = 'var(--bg3)';
      btn.style.borderColor = 'var(--border)';
      btn.style.color = 'var(--text2)';
    }
  });
  // Reload funds card for new symbol
  _loadDashFunds();
}

async function _loadDashFunds() {
  var fr = document.getElementById('dash-funds-row');
  if (!fr) return;
  try {
    var d = await api('GET', '/api/capital/check?symbol='+encodeURIComponent(_dashSymbol)+'&lots=1&strategies=S1,S8');
    if (!d || d.mode === 'paper' || !d.available) {
      fr.innerHTML = '';
      return;
    }
    var avail = d.available || 0;
    var m = d.margin || {};
    var canTrade = d.can_trade;
    var maxLots = d.buffer_lots || 0;
    var reg = {
      'NSE:NIFTY50-INDEX':   {label:'NIFTY 50',    lot:65},
      'NSE:NIFTYBANK-INDEX': {label:'BANK NIFTY',  lot:30},
      'NSE:FINNIFTY-INDEX':  {label:'FINNIFTY',    lot:60},
      'BSE:SENSEX-INDEX':    {label:'SENSEX',      lot:20},
    };
    var info = reg[_dashSymbol] || {label:_dashSymbol, lot:'—'};

    fr.innerHTML = '<div class="card" style="margin-bottom:12px">'
      + '<div class="card-header"><div class="card-title">Account Funds — '+esc(info.label)+'</div>'
      + '<button class="btn btn-ghost btn-sm" onclick="nav(\'automate\')">+ New Automation</button></div>'
      + '<div class="card-body">'
      + '<div class="kpi-grid" style="margin-bottom:0">'
      + '<div class="kpi green"><div class="kpi-label">Available Balance</div>'
      + '<div class="kpi-value pos" style="font-size:20px">₹'+Number(avail).toLocaleString('en-IN')+'</div>'
      + '<div class="kpi-sub">Fyers account</div></div>'
      + '<div class="kpi '+(canTrade?'blue':'red')+'"><div class="kpi-label">1 Lot Margin</div>'
      + '<div class="kpi-value neutral" style="font-size:20px">₹'+Number(m.net_required||0).toLocaleString('en-IN')+'</div>'
      + '<div class="kpi-sub">'+esc(info.label)+' Iron Fly ±2</div></div>'
      + '<div class="kpi"><div class="kpi-label">Lot Size</div>'
      + '<div class="kpi-value neutral">'+info.lot+'</div>'
      + '<div class="kpi-sub">units per contract</div></div>'
      + '<div class="kpi '+(canTrade?'green':'red')+'"><div class="kpi-label">Max Lots Possible</div>'
      + '<div class="kpi-value '+(canTrade?'pos':'neg')+'">'+(canTrade ? maxLots+1 : 0)+'</div>'
      + '<div class="kpi-sub">'+(canTrade?'with current balance':'insufficient funds')+'</div></div>'
      + '</div>'
      + (m.net_premium ? '<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:var(--text2);margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">'
        + '<span>Est. premium collected: <strong style="color:var(--green)">₹'+Number(m.net_premium).toLocaleString('en-IN')+'</strong></span>'
        + '<span>Max profit (50% target): <strong style="color:var(--green)">₹'+Number(m.profit_at_50pct||0).toLocaleString('en-IN')+'</strong></span>'
        + '<span>Max loss: <strong style="color:var(--red)">₹'+Number(m.max_loss||0).toLocaleString('en-IN')+'</strong></span>'
        + '</div>' : '')
      + '</div></div>';
  } catch(e) {}
}

async function renderDashboard() {
  var el = document.getElementById('pg-dashboard');
  el.innerHTML = '<div class="empty"><div class="spin" style="width:24px;height:24px;border-width:3px"></div></div>';
  try {
    var s = await api('GET', '/api/dashboard/summary');
    var spot = s.spot||0;
    var spotFmt = spot>0 ? '\u20b9'+Number(spot).toLocaleString('en-IN',{minimumFractionDigits:1,maximumFractionDigits:1}) : '\u2014';
    var lp=s.today_live_pnl||0, pp=s.today_paper_pnl||0;
    var ml=s.month_live_pnl||0, mp=s.month_paper_pnl||0;
    var atm=s.atm||0;

    // Auto cards
    var autoCards = '';
    (s.automations||[]).forEach(function(a) {
      var pnl = a.mode==='live' ? (a.today_pnl||0) : (a.today_shadow_pnl||0);
      var trades = a.mode==='live' ? (a.today_trades||0) : (a.today_shadow_trades||0);
      var modeBadge = a.mode==='live' ? '<span class="badge live">Live</span>' : '<span class="badge paper">Paper</span>';
      var statusDot = a.status==='RUNNING' ? '<div class="dot green pulse"></div>' : '<div class="dot gray"></div>';
      var stratBadges = (a.strategies||[]).slice(0,4).map(function(s){ return '<span class="badge strategy">'+s+'</span>'; }).join(' ');
      // P&L colour and paper note
      var pnlNote = a.mode!=='live' ? '<span style="font-size:9px;color:var(--amber)">(paper)</span>' : '';
      autoCards += '<div class="trade-item" style="cursor:pointer" onclick="nav(\'live\')">'
        + '<div class="trade-icon" style="background:var(--bg3)">'+statusDot+'</div>'
        + '<div class="trade-info">'
        + '<div class="trade-name">'+esc(a.name)+'</div>'
        + '<div class="trade-meta" style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">'+modeBadge+' '+stratBadges+'</div>'
        + '</div>'
        + '<div class="trade-pnl">'
        + '<div class="trade-pnl-val '+pnlClass(pnl)+'">'+pnlFmt(pnl)+' '+pnlNote+'</div>'
        + '<div class="trade-pnl-sub">'+trades+' trade'+(trades!==1?'s':'')+'</div>'
        + '</div></div>';
    });

    // Symbol tabs
    var symTabs = _dashSymbols.map(function(sym) {
      var isActive = sym.value === _dashSymbol;
      return '<button id="dsym-'+sym.short+'" onclick="setDashSymbol(\''+sym.value+'\')" style="padding:5px 12px;border:1px solid '+(isActive?'rgba(0,230,118,.4)':'var(--border)')+';border-radius:var(--radius-sm);background:'+(isActive?'var(--green-bg)':'var(--bg3)')+';color:'+(isActive?'var(--green)':'var(--text2)')+';font-size:12px;font-weight:600;cursor:pointer;transition:all .15s">'+sym.label+'</button>';
    }).join('');

    el.innerHTML = '<div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px"><div><div class="page-title">Dashboard</div><div class="page-sub">'+
      (s.market_status==='live' ? 'Market open &bull; Updated '+esc(s.market_updated||'') : s.market_message||'Waiting for market')+'</div></div>'
      + '<div style="display:flex;gap:6px;flex-wrap:wrap">'+symTabs+'</div></div>'+

      '<div class="kpi-grid">'
      + '<div class="kpi green"><div class="kpi-label">'+esc((_dashSymbols.find(function(x){return x.value===_dashSymbol;})||{label:'NIFTY'}).label)+'</div><div class="kpi-value mono neutral">'+spotFmt+'</div><div class="kpi-sub">ATM '+(atm>0?atm.toLocaleString('en-IN'):'—')+'</div></div>'

async function renderBrokers() {
  var el = document.getElementById('pg-brokers');
  el.innerHTML = '<div class="page-header"><div class="page-title">My Brokers</div><div class="page-sub">Connect your broker to enable live trading</div></div><div class="empty"><div class="spin" style="width:24px;height:24px;border-width:3px"></div></div>';
  try {
    var [defsRes, brokRes] = await Promise.all([
      api('GET', '/api/brokers/definitions'),
      api('GET', '/api/brokers')
    ]);
    brokerDefs = defsRes.brokers || [];
    myBrokers = brokRes.brokers || [];
    _renderBrokersUI(el);
  } catch(e) {
    el.innerHTML += '<div class="alert alert-error">'+esc(e.message)+'</div>';
  }
}

function _renderBrokersUI(el) {
  var connected = myBrokers.filter(function(b){ return b.is_connected; });
  var html = '<div class="page-header"><div class="page-title">My Brokers</div><div class="page-sub">Connect your broker to enable live trading</div></div>';

  // Connected brokers
  if (connected.length > 0) {
    html += '<div class="section-title">Connected</div>';
    connected.forEach(function(b) {
      var def = brokerDefs.find(function(d){ return d.id===b.broker_id; }) || {};
      var lastRefresh = b.last_token_refresh ? 'Token refreshed ' + fmtTime(b.last_token_refresh) : 'Token auto-refreshes on every use';
      html += '<div class="card">'
        + '<div class="card-header">'
        + '<div style="display:flex;align-items:center;gap:10px"><div style="font-size:20px">'+(def.flag||'&#127981;')+'</div><div><div class="card-title">'+esc(b.broker_name)+'</div><div style="font-size:11px;color:var(--text2)">'+lastRefresh+'</div></div></div>'
        + '<div style="display:flex;gap:6px;align-items:center"><span class="badge running">&#9679; Connected</span><button class="btn btn-ghost btn-sm" onclick="testBroker(\''+b.broker_id+'\')">Test</button><button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="disconnectBroker(\''+b.broker_id+'\')">Remove</button></div>'
        + '</div>'
        + '<div id="test-result-'+b.broker_id+'"></div>'
        + '</div>';
    });
  }

  // Add broker section
  html += '<div class="section-title" style="margin-top:4px">Add Broker</div>';
  brokerDefs.forEach(function(def) {
    var already = myBrokers.find(function(b){ return b.broker_id===def.id; });
    if (already && already.is_connected) return;
    html += '<div class="card" id="broker-add-'+def.id+'">'
      + '<div class="card-header" style="cursor:pointer" onclick="toggleBrokerForm(\''+def.id+'\')">'
      + '<div style="display:flex;align-items:center;gap:10px"><div style="font-size:20px">'+(def.flag||'&#127981;')+'</div><div><div class="card-title">'+esc(def.name)+'</div><div style="font-size:11px;color:var(--text2)">'+esc(def.refresh||'')+'</div></div></div>'
      + '<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>'
      + '</div>'
      + '<div id="broker-form-'+def.id+'" style="display:none"><div class="card-body">'
      + (def.fields||[]).map(function(f){
          return '<div class="field"><label>'+esc(f.label)+'</label>'
            + '<input id="bf-'+def.id+'-'+f.key+'" type="'+(f.secret?'password':'text')+'" placeholder="'+(f.hint||'')+'" value="'+(f.default||'')+'">'
            + (f.hint ? '<div class="field-hint">'+esc(f.hint)+'</div>' : '')
            + '</div>';
        }).join('')
      + '<div class="btn-row"><button class="btn btn-primary" onclick="saveBrokerCreds(\''+def.id+'\')">Save &amp; Connect</button></div>'
      + '</div></div></div>';
  });

  if (brokerDefs.length === 0) {
    html += '<div class="alert alert-info">No broker definitions configured. Ask your admin to add broker definitions.</div>';
  }

  el.innerHTML = html;
}

function toggleBrokerForm(defId) {
  var el = document.getElementById('broker-form-'+defId);
  if (el) el.style.display = el.style.display==='none' ? 'block' : 'none';
}

async function saveBrokerCreds(defId) {
  var def = brokerDefs.find(function(d){ return d.id===defId; });
  if (!def) return;
  var fields = {};
  (def.fields||[]).forEach(function(f) {
    var inp = document.getElementById('bf-'+defId+'-'+f.key);
    if (inp) fields[f.key] = inp.value.trim();
  });
  try {
    await api('POST', '/api/brokers', {broker_id:defId, fields:fields});
    toast('Credentials saved. Connecting...', 'success');
    // For Fyers, redirect to OAuth
    if (defId === 'fyers') {
      var url = await api('GET', '/api/brokers/fyers/login-url');
      window.open(url.url, '_blank', 'width=600,height=700');
      // Show auth code input
      var form = document.getElementById('broker-form-'+defId);
      if (form) {
        form.innerHTML += '<div class="field" style="margin-top:12px"><label>Auth Code (from Fyers redirect)</label>'
          + '<input id="fyers-auth-code" placeholder="Paste the code from the Fyers page">'
          + '<button class="btn btn-primary btn-full" style="margin-top:8px" onclick="completeFyersConnect()">Complete Connection</button></div>';
      }
    } else {
      renderBrokers();
    }
  } catch(e) { toast(e.message, 'error'); }
}

async function completeFyersConnect() {
  var code = document.getElementById('fyers-auth-code');
  if (!code || !code.value.trim()) { toast('Enter the auth code', 'error'); return; }
  try {
    await api('POST', '/api/brokers/fyers/connect', {auth_code: code.value.trim()});
    toast('Fyers connected! Token auto-refreshes forever.', 'success');
    renderBrokers();
  } catch(e) { toast(e.message, 'error'); }
}

async function testBroker(brokerId) {
  var resEl = document.getElementById('test-result-'+brokerId);
  if (resEl) resEl.innerHTML = '<div class="card-body"><div class="empty"><div class="spin" style="width:20px;height:20px;border-width:2px"></div></div></div>';
  try {
    var d = await api('GET', '/api/market/live');
    if (d.ok && d.spot) {
      var atm = d.atm||0;
      var chain = d.chain||{};
      var atm_data = chain[atm]||{};
      if (resEl) resEl.innerHTML = '<div class="card-body">'
        + '<div class="alert alert-success">Connected &bull; NIFTY ' + Number(d.spot).toLocaleString('en-IN',{minimumFractionDigits:1}) + '</div>'
        + '<table class="tbl"><thead><tr><th>Strike</th><th>CE</th><th>PE</th><th>Combined</th></tr></thead><tbody>'
        + Object.entries(chain).sort(function(a,b){return a[0]-b[0];}).slice(0,7).map(function(kv){
            var s=kv[0], v=kv[1];
            var isAtm = parseInt(s)===atm;
            return '<tr'+(isAtm?' style="background:var(--bg3)"':'')+'><td>'+(isAtm?'<b>'+s+'</b>':s)+'</td><td class="mono">'+(v.ce_ltp||0).toFixed(1)+'</td><td class="mono">'+(v.pe_ltp||0).toFixed(1)+'</td><td class="mono"><b>'+(v.combined||0).toFixed(1)+'</b></td></tr>';
          }).join('')
        + '</tbody></table></div>';
    } else {
      if (resEl) resEl.innerHTML = '<div class="card-body"><div class="alert alert-warn">'+(d.message||'No data')+'</div></div>';
    }
  } catch(e) {
    if (resEl) resEl.innerHTML = '<div class="card-body"><div class="alert alert-error">'+esc(e.message)+'</div></div>';
  }
}

async function disconnectBroker(brokerId) {
  if (!confirm('Remove this broker connection?')) return;
  try {
    await api('DELETE', '/api/brokers/'+brokerId);
    toast('Broker removed', 'success');
    renderBrokers();
  } catch(e) { toast(e.message, 'error'); }
}

function toggleStrat(code) {
  if (selectedStrategies.has(code)) {
    selectedStrategies.delete(code);
  } else {
    selectedStrategies.add(code);
  }
  var el = document.getElementById('sp-'+code);
  if (el) el.className = 'strat-pick' + (selectedStrategies.has(code) ? ' selected' : '');
}

async function saveAuto(mode) {
  var sym = document.getElementById('af-sym').value;
  var broker = document.getElementById('af-broker').value;
  if (!broker) { toast('Connect a broker first', 'error'); return; }
  if (selectedStrategies.size === 0) { toast('Select at least one strategy', 'error'); return; }
  if (mode==='live' && !confirm('Switch to LIVE mode?\n\nReal money orders will be placed.\nOnly do this after reviewing paper Results.')) return;
  var symLabel = document.getElementById('af-sym');
  var symText = symLabel ? symLabel.options[symLabel.selectedIndex].text : sym.split(':')[1]||sym;
  var stratList = Array.from(selectedStrategies);
  try {
    await api('POST', '/api/automations', {
      name: symText + ' \u2014 ' + stratList.join('+'),
      symbol: sym, broker_id: broker,
      strategies: stratList, mode: mode,
      shadow_mode: document.getElementById('af-shadow').checked,
      telegram_alerts: document.getElementById('af-tg').checked,
      config: {
        lots: parseInt(document.getElementById('af-lots').value)||1,
        lot_size: parseInt(document.getElementById('af-lotsize').value)||75,
        max_loss_pct: parseInt(document.getElementById('af-maxloss').value)||30,
        profit_target_pct: parseInt(document.getElementById('af-profit').value)||50,
        auto_exit_time: document.getElementById('af-exit').value||'14:00',
      }
    });
    toast('Automation saved', 'success');
    hideAutoForm();
    renderAutomate();
  } catch(e) { toast(e.message, 'error'); }
}

async function startAuto(autoId) {
  try {
    await api('POST', '/api/engine/start', {automation_id: autoId});
    toast('Engine started', 'success');
    renderAutomate();
  } catch(e) { toast(e.message, 'error'); }
}

async function stopAuto(autoId) {
  try {

    toast('Engine stopped', 'success');
    renderAutomate();
  } catch(e) { toast(e.message, 'error'); }

async function deleteAuto(autoId) {

    await api('DELETE', '/api/automations/'+autoId);
    toast('Deleted', 'success');
    renderAutomate();
  } catch(e) { toast(e.message, 'error'); }
}

async function renderLive() {
  var el = document.getElementById('pg-live');
  el.innerHTML = '<div class="page-header"><div class="page-title">Live Monitor</div><div class="page-sub">Real-time engine status and positions</div></div><div id="live-content"><div class="empty"><div class="spin" style="width:24px;height:24px;border-width:3px"></div></div></div>';
  if (_liveRefreshTimer) clearInterval(_liveRefreshTimer);
  await _refreshLive();
  _liveRefreshTimer = setInterval(_refreshLive, 15000);
}

async function _refreshLive() {
  if (!document.getElementById('pg-live').classList.contains('active')) {
    clearInterval(_liveRefreshTimer); _liveRefreshTimer = null; return;
  }
  try {
    var [engRes, mktRes] = await Promise.all([
      api('GET', '/api/engine/status'),
      api('GET', '/api/market/status')
    ]);
    var el = document.getElementById('live-content');
    if (!el) return;
    var isLive = engRes.engine_mode === 'live';
    var isRunning = engRes.running;
    var spot = mktRes.spot||0;
    var mktStatus = mktRes.status||'waiting';

    var modeBadgeHtml = '';
    if (isRunning) {
      modeBadgeHtml = isLive
        ? '<span class="badge live">&#128308; LIVE TRADING</span>'
        : '<span class="badge paper">&#128203; PAPER MODE</span>';
    }

    // Market status
    var mktHtml = '<div class="kpi-grid" style="margin-bottom:12px">'
      + '<div class="kpi '+(mktStatus==='live'?'green':'')+'">'
      + '<div class="kpi-label">NIFTY Spot</div>'
      + '<div class="kpi-value mono">'+(spot>0?'\u20b9'+Number(spot).toLocaleString('en-IN',{minimumFractionDigits:1}):'—')+'</div>'
      + '<div class="kpi-sub">'+(mktStatus==='live'?'Live &bull; '+esc(mktRes.updated||''):esc(mktRes.message||''))+'</div></div>'
      + '<div class="kpi '+(isRunning?'blue':'')+'">'
      + '<div class="kpi-label">Engine</div>'
      + '<div class="kpi-value neutral" style="font-size:14px">'+(isRunning?'RUNNING':'IDLE')+'</div>'
      + '<div class="kpi-sub">'+(isRunning?'Monitoring every 60s':'Not running')+'</div></div>'
      + '<div class="kpi">'
      + '<div class="kpi-label">ATM</div>'
      + '<div class="kpi-value mono">'+(engRes.atm>0?engRes.atm.toLocaleString('en-IN'):(mktRes.atm>0?mktRes.atm.toLocaleString('en-IN'):'—'))+'</div>'
      + '<div class="kpi-sub">Strike</div></div>'
      + '<div class="kpi '+(engRes.combined>0?'amber':'')+'">'
      + '<div class="kpi-label">Combined Premium</div>'
      + '<div class="kpi-value mono">'+(engRes.combined>0?engRes.combined.toFixed(1):'—')+'</div>'
      + '<div class="kpi-sub">CE + PE</div></div>'
      + '</div>';

    // Engine status bar
    var statusBar = '<div class="card" style="margin-bottom:12px"><div class="card-body" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">'
      + '<div style="display:flex;align-items:center;gap:8px">'+(isRunning?'<div class="dot green pulse"></div>':'<div class="dot gray"></div>')+' <span style="font-size:13px;font-weight:600">'+(isRunning?'Engine Running':'Engine Idle')+'</span> '+modeBadgeHtml+'</div>'
      + '<div class="btn-row">'
      + (isRunning ? '<button class="btn btn-danger btn-sm" onclick="forceExit()">Force Exit</button><button class="btn btn-ghost btn-sm" onclick="stopEngine()">Stop</button>' : '<button class="btn btn-primary btn-sm" onclick="nav(\'automate\')">Start Engine</button>')
      + '</div></div></div>';

    // Open position
    var posHtml = '';
    if (engRes.position) {
      var pos = engRes.position;
      var sig = pos.signal||{};
      var entryPnl = engRes.combined > 0 ? ((pos.entry_combined||0) - engRes.combined) * (pos.lots||1) * (pos.lot_size||75) : 0;
      posHtml = '<div class="section-title">Open Position</div>'
        + '<div class="card '+(isLive?'live-border':'paper-border')+'" style="margin-bottom:12px"><div class="card-body">'
        + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">'
        + '<div><div style="font-size:14px;font-weight:600">'+esc(sig.code||'')+'</div><div style="font-size:12px;color:var(--text2)">'+esc(sig.name||'')+'</div></div>'
        + '<div style="text-align:right"><div class="kpi-value '+pnlClass(entryPnl)+'" style="font-size:18px">'+pnlFmt(entryPnl)+'</div><div style="font-size:11px;color:var(--text2)">Unrealised</div></div>'
        + '</div>'
        + '<div class="card-row"><span class="card-label">Entry Combined</span><span class="card-val mono">\u20b9'+(pos.entry_combined||0).toFixed(1)+'</span></div>'
        + '<div class="card-row"><span class="card-label">Current Combined</span><span class="card-val mono">\u20b9'+(engRes.combined||0).toFixed(1)+'</span></div>'
        + '<div class="card-row"><span class="card-label">Entry Time</span><span class="card-val">'+fmtTime(pos.entry_time)+'</span></div>'
        + '<div class="card-row"><span class="card-label">Strike</span><span class="card-val mono">'+(sig.strike||'—')+'</span></div>'
        + '</div></div>';
    }

    // Today trades
    var todayHtml = '<div class="section-title">Today\'s Trades</div>';
    var todayTrades = engRes.today_trades||[];
    if (todayTrades.length > 0) {
      todayHtml += '<div class="card"><div class="card-body" style="padding:0 16px">'
        + todayTrades.map(function(t) {
            var pnl = t.pnl||0;
            var icon = t.is_open ? '<div class="dot amber pulse"></div>' : (pnl>0?'&#8593;':'&#8595;');
            return '<div class="trade-item">'
              + '<div class="trade-icon" style="background:var(--bg3);font-size:14px">'+icon+'</div>'
              + '<div class="trade-info"><div class="trade-name">'+esc(t.strategy||'')+'</div><div class="trade-meta">'+esc(t.exit_reason||'Open')+'</div></div>'
              + '<div class="trade-pnl"><div class="trade-pnl-val '+(t.is_open?'':''+pnlClass(pnl))+'">'+( t.is_open?'OPEN':pnlFmt(pnl))+'</div><div class="trade-pnl-sub">'+esc(t.entry_time||'')+'</div></div>'
              + '</div>';
          }).join('')
        + '</div></div>';
    } else {
      todayHtml += '<div class="card"><div class="card-body"><div class="empty" style="padding:16px"><div class="empty-sub">No trades today</div></div></div></div>';
    }

    // Reconciliation panel (live mode only)
    var reconHtml = '';
    if (engRes.engine_mode === 'live') {
      reconHtml = '<div class="section-title" style="display:flex;align-items:center;justify-content:space-between">'
        + '<span>Order Reconciliation</span>'
        + '<button class="btn btn-ghost btn-sm" onclick="runReconcile()" id="recon-btn">Check Now</button>'
        + '</div>'
        + '<div class="card" style="margin-bottom:12px" id="recon-panel">'
        + '<div class="card-body"><div style="font-size:12px;color:var(--text2)">Click Check Now to verify all orders and positions match Fyers account.</div></div>'
        + '</div>';
    }

    // Engine log
    var logHtml = '<div class="section-title">Engine Log</div><div class="card"><div class="card-body" style="padding:8px 16px">'
      + (engRes.log||[]).slice(-15).reverse().map(function(l){
          return '<div class="log-entry"><span class="log-time">'+esc(l.ts||'')+'</span><span class="log-'+((l.kind||'INFO').toLowerCase())+'">'+esc(l.msg||'')+'</span></div>';
        }).join('')
      + ((!engRes.log||!engRes.log.length)?'<div style="color:var(--text2);font-size:12px;padding:8px 0">No log entries yet</div>':'')
      + '</div></div>';

    el.innerHTML = mktHtml + statusBar + posHtml + reconHtml + todayHtml + logHtml;
  } catch(e) {
    var el2 = document.getElementById('live-content');
    if (el2) el2.innerHTML = '<div class="alert alert-error">'+esc(e.message)+'</div>';
  }
}

async function stopEngine() {
  try { await api('POST', '/api/engine/stop'); toast('Engine stopped', 'success'); await _refreshLive(); }
  catch(e) { toast(e.message, 'error'); }
}

async function forceExit() {
  if (!confirm('Force exit all positions now?')) return;
  try { await api('POST', '/api/engine/force-exit'); toast('Force exit executed', 'success'); await _refreshLive(); }
  catch(e) { toast(e.message, 'error'); }
}

// ── TRADES ───────────────────────────────────────────────────
async function renderTrades() {
  var el = document.getElementById('pg-trades');
  el.innerHTML = '<div class="page-header"><div class="page-title">Trade History</div></div>'
    + '<div style="display:flex;gap:8px;margin-bottom:12px">'
    + '<button class="btn btn-ghost btn-sm" id="tt-live" onclick="loadTradesTab(\'live\')" style="border-color:var(--green);color:var(--green)">Live Trades</button>'
    + '<button class="btn btn-ghost btn-sm" id="tt-paper" onclick="loadTradesTab(\'paper\')">Paper Trades</button>'
    + '</div>'
    + '<div id="trades-content"><div class="empty"><div class="spin" style="width:24px;height:24px;border-width:3px"></div></div></div>';
  loadTradesTab('live');
}

async function loadTradesTab(tab) {
  document.getElementById('tt-live').style.borderColor = tab==='live' ? 'var(--green)' : 'var(--border)';
  document.getElementById('tt-live').style.color = tab==='live' ? 'var(--green)' : 'var(--text2)';
  document.getElementById('tt-paper').style.borderColor = tab==='paper' ? 'var(--amber)' : 'var(--border)';
  document.getElementById('tt-paper').style.color = tab==='paper' ? 'var(--amber)' : 'var(--text2)';
  var el = document.getElementById('trades-content');
  el.innerHTML = '<div class="empty"><div class="spin" style="width:20px;height:20px;border-width:2px"></div></div>';
  try {
    var endpoint = tab==='live' ? '/api/trades' : '/api/shadow/trades?days=30';
    var d = await api('GET', endpoint);
    var trades = d.trades||[];
    if (!trades.length) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">'+(tab==='live'?'&#128200;':'&#128203;')+'</div><div class="empty-title">No '+tab+' trades yet</div><div class="empty-sub">'+(tab==='paper'?'Run automations in shadow mode to see paper results':'Start an automation in live mode')+'</div></div>';
      return;
    }
    el.innerHTML = '<div class="card"><div class="card-body" style="padding:0 16px">'
      + trades.map(function(t) {
          var pnl = t.net_pnl||t.pnl||0;
          var isOpen = t.is_open;
          var modeBadge = tab==='paper' ? '<span class="badge paper" style="font-size:9px">Paper</span>' : '<span class="badge live" style="font-size:9px">Live</span>';
          return '<div class="trade-item">'
            + '<div class="trade-icon" style="background:'+(isOpen?'var(--amber-bg)':pnl>0?'var(--green-bg)':'var(--red-bg)')+';font-size:12px;font-weight:700;color:'+(isOpen?'var(--amber)':pnl>0?'var(--green)':'var(--red)')+';">'+(isOpen?'~':pnl>0?'+':'&#8722;')+'</div>'
            + '<div class="trade-info">'
            + '<div class="trade-name" style="display:flex;gap:6px;align-items:center"><span class="badge strategy">'+esc(t.strategy_code||t.strategy||'')+'</span> '+modeBadge+'</div>'
            + '<div class="trade-meta">'+esc(t.trade_date||t.date||'') + ' &bull; ATM ' + esc(t.atm_strike||t.atm||'') + (t.exit_reason ? ' &bull; '+esc(t.exit_reason) : '') + '</div>'
            + '</div>'
            + '<div class="trade-pnl">'
            + '<div class="trade-pnl-val '+(isOpen?'':''+pnlClass(pnl))+'">'+(isOpen?'OPEN':pnlFmt(pnl))+'</div>'
            + '<div class="trade-pnl-sub">Entry \u20b9'+(t.entry_combined||t.entry||0).toFixed(1)+'</div>'
            + '</div></div>';
        }).join('')
      + '</div></div>';
  } catch(e) {
    el.innerHTML = '<div class="alert alert-error">'+esc(e.message)+'</div>';
  }
}

// ── PERFORMANCE ──────────────────────────────────────────────
var _equityChart = null;

async function renderPerformance() {
  var el = document.getElementById('pg-performance');
  var days = 30;
  el.innerHTML = '<div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start">'
    + '<div><div class="page-title">Paper Results</div><div class="page-sub">Shadow mode simulation performance</div></div>'
    + '<select id="perf-days" onchange="renderPerformance()" style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:6px 10px;font-size:12px">'
    + '<option value="7">7 days</option><option value="30" selected>30 days</option><option value="90">90 days</option><option value="365">All time</option>'
    + '</select></div>'
    + '<div id="perf-content"><div class="empty"><div class="spin" style="width:24px;height:24px;border-width:3px"></div></div></div>';

  try {
    var sel = document.getElementById('perf-days');
    if (sel) days = parseInt(sel.value)||30;
    var [perfRes, tradesRes] = await Promise.all([
      api('GET', '/api/shadow/performance?days='+days),
      api('GET', '/api/shadow/trades?days='+days)
    ]);
    var p = perfRes;
    var el2 = document.getElementById('perf-content');
    if (!el2) return;

    if (!p.total_trades) {
      el2.innerHTML = '<div class="empty"><div class="empty-icon">&#128202;</div><div class="empty-title">No paper trades yet</div><div class="empty-sub">Enable Shadow Mode on an automation and run it during market hours (9:15-15:30 IST)</div></div>';
      return;
    }

    var kpiHtml = '<div class="kpi-grid">'
      + '<div class="kpi '+(+(p.total_pnl||0)>=0?'green':'red')+'"><div class="kpi-label">Total P&amp;L</div><div class="kpi-value '+pnlClass(p.total_pnl)+'">'+pnlFmt(p.total_pnl)+'</div><div class="kpi-sub">Last '+days+' days</div></div>'
      + '<div class="kpi blue"><div class="kpi-label">Win Rate</div><div class="kpi-value neutral">'+(p.win_rate||0)+'%</div><div class="kpi-sub">'+(p.wins||0)+' / '+(p.total_trades||0)+'</div></div>'
      + '<div class="kpi"><div class="kpi-label">Total Trades</div><div class="kpi-value neutral">'+(p.total_trades||0)+'</div><div class="kpi-sub">'+(p.losses||0)+' losses</div></div>'
      + '<div class="kpi '+(+(p.avg_pnl||0)>=0?'green':'red')+'"><div class="kpi-label">Avg P&amp;L</div><div class="kpi-value '+pnlClass(p.avg_pnl)+'">'+pnlFmt(p.avg_pnl)+'</div><div class="kpi-sub">Per trade</div></div>'
      + '</div>';

    // Best/worst
    var extremesHtml = '<div class="kpi-grid" style="margin-bottom:12px">'
      + '<div class="kpi green"><div class="kpi-label">Best Day</div><div class="kpi-value pos">'+(p.best_day?pnlFmt(p.best_day.pnl):'—')+'</div><div class="kpi-sub">'+(p.best_day?p.best_day.date:'')+'</div></div>'
      + '<div class="kpi red"><div class="kpi-label">Worst Day</div><div class="kpi-value neg">'+(p.worst_day?pnlFmt(p.worst_day.pnl):'—')+'</div><div class="kpi-sub">'+(p.worst_day?p.worst_day.date:'')+'</div></div>'
      + '</div>';

    // Equity curve
    var chartHtml = '<div class="card" style="margin-bottom:12px"><div class="card-header"><div class="card-title">Equity Curve</div></div><div class="card-body" style="padding:12px"><canvas id="equity-chart" style="max-height:180px"></canvas></div></div>';

    // By strategy
    var stratHtml = '<div class="section-title">By Strategy</div><div class="card" style="margin-bottom:12px"><div class="card-body" style="padding:0 16px">';
    var strats = p.by_strategy||{};
    if (Object.keys(strats).length) {
      Object.entries(strats).forEach(function(kv) {
        var code=kv[0], s=kv[1];
        stratHtml += '<div class="trade-item">'
          + '<div class="trade-icon" style="background:var(--bg3);font-size:11px;font-weight:700">'+esc(code)+'</div>'
          + '<div class="trade-info"><div class="trade-name">'+esc(code)+'</div><div class="trade-meta">'+s.trades+' trades &bull; '+s.win_rate+'% win rate</div></div>'
          + '<div class="trade-pnl"><div class="trade-pnl-val '+pnlClass(s.total_pnl)+'">'+pnlFmt(s.total_pnl)+'</div><div class="trade-pnl-sub">avg '+pnlFmt(s.avg_pnl)+'</div></div>'
          + '</div>';
      });
    } else { stratHtml += '<div style="padding:12px 0;color:var(--text2);font-size:12px">No data</div>'; }
    stratHtml += '</div></div>';

    // Exit reasons
    var reasons = p.exit_reasons||{};
    var exitHtml = '<div class="section-title">Exit Reasons</div><div class="card" style="margin-bottom:12px"><div class="card-body" style="padding:0 16px">';
    Object.entries(reasons).forEach(function(kv) {
      exitHtml += '<div class="card-row"><span class="card-label">'+esc(kv[0].replace(/_/g,' '))+'</span><span class="card-val">'+kv[1]+'</span></div>';
    });
    exitHtml += '</div></div>';

    // Daily
    var dailyHtml = '<div class="section-title">Daily Breakdown</div><div class="card"><div class="card-body" style="padding:0 16px">';
    (p.by_day||[]).slice(-14).reverse().forEach(function(d) {
      dailyHtml += '<div class="trade-item">'
        + '<div class="trade-info"><div class="trade-name">'+esc(d.date)+'</div><div class="trade-meta">'+d.trades+' trades &bull; '+d.wins+' wins</div></div>'
        + '<div class="trade-pnl"><div class="trade-pnl-val '+pnlClass(d.pnl)+'">'+pnlFmt(d.pnl)+'</div></div>'
        + '</div>';
    });
    if (!p.by_day || !p.by_day.length) dailyHtml += '<div style="padding:12px 0;color:var(--text2);font-size:12px">No data</div>';
    dailyHtml += '</div></div>';

    el2.innerHTML = kpiHtml + extremesHtml + chartHtml + stratHtml + exitHtml + dailyHtml;

    // Draw equity chart
    var curve = p.equity_curve||[];
    if (curve.length > 1) {
      var loadChart = function() {
        var canvas = document.getElementById('equity-chart');
        if (!canvas) return;
        var ctx = canvas.getContext('2d');
        if (_equityChart) { try{ _equityChart.destroy(); }catch(e){} }
        var lastVal = curve[curve.length-1].equity||0;
        var color = lastVal >= 0 ? '#00e676' : '#ff5252';
        _equityChart = new Chart(ctx, {
          type:'line',
          data:{
            labels: curve.map(function(c){ return c.date.slice(5); }),
            datasets:[{data:curve.map(function(c){ return c.equity; }),borderColor:color,backgroundColor:color+'15',fill:true,tension:.3,pointRadius:2,borderWidth:2}]
          },
          options:{plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:10},maxTicksLimit:8}},y:{grid:{color:'rgba(255,255,255,.05)'},ticks:{font:{size:10},callback:function(v){ return '\u20b9'+v.toLocaleString('en-IN'); }}}},responsive:true,maintainAspectRatio:false}
        });
      };
      if (window.Chart) { loadChart(); }
      else {
        var s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js';
        s.onload = loadChart;
        document.head.appendChild(s);
      }
    }
  } catch(e) {
    var el3 = document.getElementById('perf-content');
    if (el3) el3.innerHTML = '<div class="alert alert-error">'+esc(e.message)+'</div>';
  }
}

async function saveProfile() {
  try {
    await api('PUT', '/api/me', {name: document.getElementById('prof-name').value.trim(), timezone: document.getElementById('prof-tz').value});
    toast('Profile saved', 'success');
    session.user.name = document.getElementById('prof-name').value.trim();
    localStorage.setItem('algodesk', JSON.stringify(session));
    document.getElementById('tb-av').textContent = session.user.name.split(' ').map(function(w){return w[0];}).join('').substring(0,2).toUpperCase();
  } catch(e) { toast(e.message, 'error'); }
}

async function changePassword() {
  var old = document.getElementById('pw-old').value;
  var nw = document.getElementById('pw-new').value;
  var nw2 = document.getElementById('pw-new2').value;
  if (!old||!nw) { toast('Fill all fields', 'error'); return; }
  if (nw !== nw2) { toast('Passwords do not match', 'error'); return; }
  try {
    await api('POST', '/api/auth/change-password', {old_password:old, new_password:nw});
    toast('Password updated', 'success');
    document.getElementById('pw-old').value='';
    document.getElementById('pw-new').value='';
    document.getElementById('pw-new2').value='';
  } catch(e) { toast(e.message, 'error'); }
}

async function addTg() {
  var name = document.getElementById('tg-name').value.trim();
  var token = document.getElementById('tg-token').value.trim();
  var chat = document.getElementById('tg-chat').value.trim();
  if (!name||!token||!chat) { toast('Fill all Telegram fields', 'error'); return; }
  try {
    await api('POST', '/api/telegram/accounts', {name:name, token:token, chat:chat, active:true});
    toast('Account added', 'success');
    renderProfile();
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteTg(id) {
  if (!confirm('Remove this Telegram account?')) return;
  try { await api('DELETE', '/api/telegram/accounts/'+id); toast('Removed', 'success'); renderProfile(); }
  catch(e) { toast(e.message, 'error'); }
}

async function toggleTg(id, active) {
  try { await api('PUT', '/api/telegram/accounts/'+id, {active:active}); }
  catch(e) { toast(e.message, 'error'); }
}

async function testTg(id) {
  try { await api('POST', '/api/telegram/test/'+id); toast('Test sent!', 'success'); }
  catch(e) { toast(e.message, 'error'); }
}

async function renderAdmin() {

    el.innerHTML = '<div class="alert alert-error">Access denied</div>'; return;

  el.innerHTML = '<div class="page-header"><div class="page-title">Admin</div></div><div class="empty"><div class="spin" style="width:24px;height:24px;border-width:3px"></div></div>';

      + '<div class="kpi amber"><div class="kpi-label">Trades Today</div><div class="kpi-value neutral">'+(stats.trades_today||0)+'</div></div>'
      + '<div class="kpi"><div class="kpi-label">Running</div><div class="kpi-value neutral">'+(stats.running_engines||0)+'</div></div>'
      + '</div>'
      + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div class="section-title" style="margin-bottom:0">Users</div><button class="btn btn-primary btn-sm" onclick="createInvite()">Create Invite</button></div>'
      + '<div id="invite-res"></div>'
      + '<div class="card"><div class="card-body" style="padding:0 16px">'

          return '<div class="card-row">'
            + '<div><div style="font-size:13px;font-weight:500">'+esc(u.name||u.email||'')+'</div><div style="font-size:11px;color:var(--text2)">'+esc(u.email||'')+'</div></div>'

async function createInvite() {
  try {
    var d = await api('POST', '/api/admin/invite', {role:'USER', plan:'FREE'});

    if (el) el.innerHTML = '<div class="alert alert-success" style="margin-bottom:10px">Invite URL: <code style="word-break:break-all;font-size:11px">'+esc(d.invite_url||d.token||'')+'</code></div>';

}

async function suspendUser(uid) {
  if (!confirm('Suspend this user?')) return;
  try { await api('POST', '/api/admin/users/'+uid+'/suspend'); toast('Suspended', 'success'); renderAdmin(); }
  catch(e) { toast(e.message, 'error'); }
}

async function activateUser(uid) {
  try { await api('POST', '/api/admin/users/'+uid+'/activate'); toast('Activated', 'success'); renderAdmin(); }
  catch(e) { toast(e.message, 'error'); }
}
