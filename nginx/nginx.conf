events { worker_connections 512; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Gzip static assets (HTML, JS, CSS, JSON)
  gzip on;
  gzip_vary on;
  gzip_types text/css application/javascript application/json text/plain;
  gzip_min_length 1024;
  gzip_proxied any;

  # Rate limiting zones
  # 120r/m = 2 req/sec per IP — allows ~10 concurrent page-load calls + rapid navigation
  limit_req_zone $binary_remote_addr zone=api:10m   rate=120r/m;
  limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

  upstream backend {
    server backend:8000;
    keepalive 32;
  }

  # HTTP → HTTPS redirect
  server {
    listen 80;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name algodeskai.duckdns.org;
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    server_tokens       off;

    add_header X-Frame-Options   DENY    always;
    add_header X-Content-Type-Options nosniff always;

    # ── Static frontend ─────────────────────────────────────────
    # Serve index.html and assets directly from nginx — never proxy
    # static files through FastAPI (avoids ERR_CONTENT_LENGTH_MISMATCH
    # caused by nginx proxy-buffer limits on large single-file apps).
    root  /app/frontend;
    index index.html;

    location / {
      # SPA fallback: any path that isn't a real file → index.html
      try_files $uri $uri/ /index.html;
    }

    # ── API ─────────────────────────────────────────────────────
    location /api/auth/login {
      limit_req zone=login burst=3 nodelay;
      proxy_pass         http://backend;
      proxy_set_header   Host        $host;
      proxy_set_header   X-Real-IP   $remote_addr;
    }

    location /api/ {
      limit_req zone=api burst=40 nodelay;
      proxy_pass         http://backend;
      proxy_set_header   Host        $host;
      proxy_set_header   X-Real-IP   $remote_addr;
      proxy_read_timeout 120s;
      proxy_connect_timeout 10s;
    }

    # ── WebSocket ────────────────────────────────────────────────
    location /ws {
      proxy_pass           http://backend;
      proxy_http_version   1.1;
      proxy_set_header     Upgrade    $http_upgrade;
      proxy_set_header     Connection "upgrade";
      proxy_set_header     Host       $host;
      proxy_read_timeout   3600s;
    }

    # ── Health check ─────────────────────────────────────────────
    location /health {
      proxy_pass       http://backend;
      proxy_set_header Host $host;
      access_log       off;
    }
  }
}
